name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Install workflow demo dependencies
        working-directory: examples/bayes-workflow-demo
        run: npm ci

      - name: Build workflow demo
        working-directory: examples/bayes-workflow-demo
        run: npm run build

      - name: Create npm package tarball
        run: npm pack

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/dist

          # Package dist (needed by the vanilla demo)
          cp dist/index.js dist/index.js.map deploy/dist/
          cp dist/index.cjs dist/index.cjs.map deploy/dist/
          cp dist/index.d.ts dist/index.d.cts deploy/dist/

          # npm tarball (for installing as dependency via URL)
          cp mcmc-visualizer-*.tgz deploy/
          # Create a stable-name symlink so consumers can use a fixed URL
          ln -sf mcmc-visualizer-*.tgz deploy/mcmc-visualizer-latest.tgz

          # Vanilla demo at root
          cp examples/demo/index.html deploy/index.html
          sed -i "s|../../dist/index.js|./dist/index.js|g" deploy/index.html

          # Vue workflow demo at /workflow/
          mkdir -p deploy/workflow
          cp -r examples/bayes-workflow-demo/dist/. deploy/workflow/

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./deploy
          clean-exclude: pr-previews
          commit-message: "Deploy: package demo + workflow demo"
